version: '3.8'

services:
  mongodb:
    image: mongo:7-alpine
    container_name: ecowaste-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ecowaste
    networks:
      - ecowaste-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecowaste-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/ecowaste
      - JWT_SECRET=ecowaste_super_secret_key_2024
      - JWT_EXPIRE=30d
      - CLIENT_URL=http://localhost:3000
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - mongodb
    networks:
      - ecowaste-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecowaste-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - ecowaste-network

volumes:
  mongo_data:
    name: ecowaste_mongo_data
  backend_uploads:
    name: ecowaste_backend_uploads

networks:
  ecowaste-network:
    driver: bridge
    name: ecowaste_bridge
