services:
  mongodb:
    image: mongo:7.0
    container_name: ecowaste-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ecowaste
    healthcheck:
      test: ["CMD", "mongod", "--version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - ecowaste-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecowaste-backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/ecowaste
      - JWT_SECRET=ecowaste_super_secret_key_2024
      - JWT_EXPIRE=30d
      - CLIENT_URL=http://localhost:3000
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - ecowaste-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecowaste-frontend
    restart: always
    ports:
      - "80:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - ecowaste-network

volumes:
  mongo_data:
    name: ecowaste_mongo_data
  backend_uploads:
    name: ecowaste_backend_uploads

networks:
  ecowaste-network:
    driver: bridge
    name: ecowaste_bridge
